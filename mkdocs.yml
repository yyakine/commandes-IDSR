site_name: Commandes et Configurations IDSR
site_url: https://yyakine.github.io/commandes-IDSR/
theme:
  name: material
  features:
    - content.code.copy
    - search.highlight
    - search.suggest
  font:
    text: Merriweather Sans
  logo: assets/icon.png
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark   #switched
      primary: indigo
      accent: amber
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light  #actually the dark mode, switched for the effect
      primary: teal
      accent: deep purple
use_directory_urls: false

markdown_extensions:
  - tables
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details      # collapsible admonitions (??? info)
  - pymdownx.superfences  # code in admonitions
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true  #numéro de lignes
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true   # obligatoire, sans ça les tabs ne s'affichent pas
  - attr_list

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/cisco-prompt.js


